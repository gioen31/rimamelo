<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimamelo - Freestyle Trainer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Schermata scelta genere -->
        <div id="genre-screen" class="screen active">
            <h1>RIMAMELO</h1>
            <p>Scegli il genere del beat</p>
            <div class="button-group">
                <button id="btn-boombap" class="genre-btn">Boom Bap</button>
                <button id="btn-trap" class="genre-btn">Trap</button>
            </div>
        </div>

        <!-- Schermata scelta difficoltà -->
        <div id="difficulty-screen" class="screen">
            <h1>RIMAMELO</h1>
            <p>Scegli la difficoltà</p>
            <div class="button-group">
                <button id="btn-easy" class="diff-btn">Easy</button>
                <button id="btn-hard" class="diff-btn">Hard</button>
            </div>
            <button id="btn-back-genre" class="back-btn">← Indietro</button>
        </div>

        <!-- Schermata di gioco -->
        <div id="game-screen" class="screen">
            <div id="game-header">
                <span id="genre-label"></span>
                <span id="difficulty-label"></span>
                <button id="btn-stop" class="stop-btn">⏹ Stop</button>
            </div>
            <div id="grid-wrapper">
                <div id="grid"></div>
                <div id="ball"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
